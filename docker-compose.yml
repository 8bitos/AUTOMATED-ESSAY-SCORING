services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: essay_scoring
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # elasticsearch:
  #   image: elastic/elasticsearch:8.11.0
  #   restart: always
  #   environment:
  #     - xpack.security.enabled=false
  #     - discovery.type=single-node
  #   ports:
  #     - "9200:9200"
  #     - "9300:9300"
  #   volumes:
  #     - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: essay_scoring
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_DAILY_TOKEN_LIMIT: ${GEMINI_DAILY_TOKEN_LIMIT:-250000}
      GEMINI_LIMIT_RPM: ${GEMINI_LIMIT_RPM:-5}
      GEMINI_LIMIT_TPM: ${GEMINI_LIMIT_TPM:-250000}
      GEMINI_LIMIT_RPD: ${GEMINI_LIMIT_RPD:-20}
      AI_GRADING_WORKERS: ${AI_GRADING_WORKERS:-1}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
    depends_on:
      - db
      - redis
    restart: always

  web-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8080}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080/api}
        NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-http://backend:8080}
    ports:
      - "3001:3000"
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080/api}
      NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-http://backend:8080}
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
  redis_data:
