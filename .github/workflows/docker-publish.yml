name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: sssevendayz/sage-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: sssevendayz/sage-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        shell: bash
        run: |
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && echo "DOCKERHUB_USERNAME: OK" || (echo "DOCKERHUB_USERNAME: EMPTY" && exit 1)
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && echo "DOCKERHUB_TOKEN: OK" || (echo "DOCKERHUB_TOKEN: EMPTY" && exit 1)

      - name: Verify build context and Dockerfile
        shell: bash
        run: |
          echo "Context: ${{ matrix.context }}"
          echo "Dockerfile: ${{ matrix.dockerfile }}"
          ls -la
          ls -la backend || true
          ls -la frontend || true
          test -f "${{ matrix.dockerfile }}" || (echo "Dockerfile not found: ${{ matrix.dockerfile }}" && exit 1)
          head -n 5 "${{ matrix.dockerfile }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
